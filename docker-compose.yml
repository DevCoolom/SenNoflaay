version: '3.8'

services:
  # PostgreSQL Database for local development
  # In production, use Supabase managed PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: sennoflaay-db
    environment:
      POSTGRES_USER: ${DB_USER:-sennoflaay}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sennoflaay123}
      POSTGRES_DB: ${DB_NAME:-sennoflaay}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sennoflaay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sennoflaay-network

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sennoflaay-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - sennoflaay-network
    restart: unless-stopped

  # pgAdmin for database management (optional, for development)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sennoflaay-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - sennoflaay-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  sennoflaay-network:
    driver: bridge
