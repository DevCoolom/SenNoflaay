name: Build & Deploy

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # === TESTING & LINTING ===
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run lint

      - name: Build frontend
        run: npm run build

  # === DOCKER BUILD ===
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sennoflaay-app:latest
            ${{ secrets.DOCKER_USERNAME }}/sennoflaay-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # === DEPLOYMENT ===
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Railway Deploy
        if: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying to Railway..."

      - name: Trigger Heroku Deploy
        if: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo "Deploying to Heroku..."

  # === HEALTH CHECK ===
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check application health
        run: |
          max_attempts=10
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f "${{ secrets.APP_URL }}/health" 2>/dev/null | grep -q "ok"; then
              echo "✓ Application is healthy"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Health check attempt $attempt/$max_attempts..."
            sleep 10
          done
          echo "✗ Application health check failed"
          exit 1
